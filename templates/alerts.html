{{ template "header.html" }}

    <!-- Secondary Action Bar (Light Blue) -->
    <div class="bg-sky-100 border-b border-sky-200 shadow-sm relative z-10">
        <div class="max-w-[1600px] mx-auto px-6 py-3 flex flex-wrap items-center gap-x-8 gap-y-4">
            
            <!-- Filter Section -->
            <form class="flex items-center gap-3" onsubmit="event.preventDefault(); console.log('Filter applied');">
                <label for="topologyFilter" class="text-sm font-semibold text-sky-900 whitespace-nowrap">
                    Filter Topology:
                </label>
                <select 
                    id="topologyFilter" 
                    class="bg-white border border-sky-300 text-slate-700 text-sm rounded-md focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 block py-1.5 pl-3 pr-8 shadow-sm transition-shadow w-48"
                >
                    <option value="all">All Tests</option>
                    <option value="dns">DNS Tests Only</option>
                    <option value="video">Video/Audio Tests Only</option>
                    <option value="tcp">TCP Tests Only</option>
                </select>
                <button 
                    type="submit" 
                    class="bg-white border border-sky-300 hover:bg-sky-50 text-sky-800 px-4 py-1.5 rounded-md text-sm font-medium transition-colors duration-200 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-offset-1 focus:ring-offset-sky-100 whitespace-nowrap"
                >
                    Apply Filter
                </button>
            </form>

            <!-- Divider (Hidden on small screens) -->
            <div class="hidden md:block w-px h-6 bg-sky-300"></div>

            <!-- Graph Settings Section -->
            <div class="flex items-center gap-4">
                <span class="text-sm font-semibold text-sky-900 whitespace-nowrap">
                    Graph Direction:
                </span>
                <div class="flex items-center gap-4">
                    <label class="inline-flex items-center gap-1.5 cursor-pointer">
                        <input type="radio" name="graphDirection" value="LR" class="w-4 h-4 text-blue-600 bg-white border-sky-300 focus:ring-blue-500 focus:ring-2" checked>
                        <span class="text-sm text-slate-700 font-medium">Left to Right</span>
                    </label>
                    <label class="inline-flex items-center gap-1.5 cursor-pointer">
                        <input type="radio" name="graphDirection" value="UD" class="w-4 h-4 text-blue-600 bg-white border-sky-300 focus:ring-blue-500 focus:ring-2">
                        <span class="text-sm text-slate-700 font-medium">Up to Down</span>
                    </label>
                </div>
            </div>

        </div>
    </div>

    <!-- Main Content Area -->
    <main class="flex-grow max-w-[1600px] w-full mx-auto py-8 px-4 sm:px-6 lg:px-8">
        <!-- Card Container -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 lg:p-8">
            <div class="mb-6 border-b border-slate-100 pb-4 flex justify-between items-end">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800">Alerts Topology</h2>
                    <p class="text-sm text-slate-500 mt-1">Interactive visualization of agents, tests, and targets.</p>
                </div>
            </div>
            
            <!-- Graph Container -->
            <div id="visGraph" class="w-full h-[800px] border border-slate-200 rounded-xl bg-slate-50/50 shadow-inner overflow-hidden focus:outline-none"></div>
        </div>
    </main>
{{ template "footer.html" }}
