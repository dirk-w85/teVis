{{ template "header.html" }}
<div id="app">
    <div class="container py-4 px-3 mx-auto">
    <div class="form-container">
        <h2>ThousandEyes PoV Visualizer - {{.topic}}</h2>      
		    <div class="form-floating mb-3">
            <input type="text" id="userInput" name="userInput" size="40" placeholder="Bearer Token" required> 
            <button type="button" id="getAG">Get Account-Groups & Labels</button>           
        </div>            
            <div id="dropdown" class="justify-content-center d-none">
                <label for="dropdown">Account Groups:</label>
                <select id="ag" name="ag"></select>
            </div>
            <button id="labelBtn" class="d-none">Get Labels</button>
            <div id="dropdownLabel" class="justify-content-center d-none">
              <label for="dropdown">Labels:</label>
              <select id="label" name="label"></select>
            </div>            
            <div id="graphSettings" class="d-none">
            <hr>
            <fieldset class="radio-group">
              <legend style="font-weight: 600; font-size: 1rem; margin-bottom: 0.5rem; color: var(--midnight-blue);">Graph Settings</legend>
              <p>Direction:</p>
              <div class="form-check">
                <input class="form-check-input" type="radio" value="LR" name="radioDirection" id="radioDirection1" checked>
                <label class="form-check-label" for="radioDefault1">Left-to-Right</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" value="TD" name="radioDirection" id="radioDirection2">
                <label class="form-check-label" for="radioDefault2">Top-Down</label>
              </div>
              <br>
              <p>Look:</p>
              <div class="form-check">
                <input class="form-check-input" type="radio" value="classic" name="radioLook" id="radioDefault1" checked>
                <label class="form-check-label" for="radioDefault1">classic</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" value="dark" name="radioLook" id="radioDefault2">
                <label class="form-check-label" for="radioDefault2">dark</label>
              </div> 
            </fieldset>            
        </div>      
        <button id="diagramBtn" class="d-none">Create Diagram</button>
        <div class="d-flex justify-content-center d-none" id="loading-spinner">
          <div class="spinner-border" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
        </div>
        <div id="mermaidCard" class="card d-none">
          <div class="card-body justify-content-center" >
            <br>
            <pre id="mermaidBox" class="mermaid"></pre>    
            <br>      
          </div>
        </div>
  	  <script type="module">
          import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
          window.mermaid = mermaid; 
          mermaid.initialize({ startOnLoad: false });
      </script>      
    </div>
	</div>
</div>
<div id="root"></div>
</body>
{{ template "footer.html" }}
