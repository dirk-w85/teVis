<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThousandEyes PoV Visualizer</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Alpine.js CDN -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- Vis.js -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen flex flex-col">

    <!-- Modernized Navbar with Menus and Token Input -->
    <nav class="bg-gradient-to-r from-slate-900 to-slate-800 text-white shadow-md relative z-20">
        <div class="max-w-[1600px] mx-auto px-6 py-4 flex items-center justify-between">
            
            <!-- Left Section: Brand & Menus -->
            <div class="flex items-center gap-10">
                <!-- Brand / Logo -->
                <div class="flex items-center gap-3">
                    <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    <span class="text-xl font-semibold tracking-wide">ThousandEyes PoV Visualizer</span>
                </div>
                
                <!-- Navigation Menus -->
                <div class="hidden lg:flex items-center gap-6 text-sm font-medium text-slate-300">
                    <a href="#" class="hover:text-white transition-colors duration-200">Enterprise</a>
                    <a href="#" class="hover:text-white transition-colors duration-200">Alertts</a>
                    <a href="#" class="hover:text-white transition-colors duration-200">Endpoints</a>
                </div>
            </div>
            
            <!-- Right Section: Token Input & Mobile Menu -->
            <div class="flex items-center gap-4">
                
                <!-- Bearer Token Form with Alpine.js -->
                <form 
                    x-data="{
                        token: '',
                        isLoading: false,
                        fetchToken() {
                            this.isLoading = true;
                            
                            // Perform the GET request
                            fetch('http://localhost:8090/api/ping', {
                                method: 'GET',
                                headers: {
                                    'Authorization': 'Bearer ' + this.token,
                                    'Content-Type': 'application/json'
                                }
                            })
                            .then(response => {
                                console.log('GET /api/token executed. Status:', response.status);
                                // Handle your response data here
                                // return response.json(); 
                            })
                            .catch(error => {
                                console.error('Error fetching /api/token:', error);
                            })
                            .finally(() => {
                                this.isLoading = false;
                            });
                        }
                    }"
                    @submit.prevent="fetchToken"
                    class="hidden md:flex items-center gap-2"
                >
                    <input 
                        type="password" 
                        x-model="token"
                        placeholder="Bearer Token" 
                        class="bg-slate-800 text-white border border-slate-600 rounded-md px-3 py-1.5 text-sm focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 placeholder-slate-400 w-48 xl:w-64 transition-all"
                        required
                    >
                    <button 
                        type="submit" 
                        :disabled="isLoading"
                        :class="isLoading ? 'opacity-75 cursor-not-allowed' : 'hover:bg-blue-500'"
                        class="bg-blue-600 text-white px-4 py-1.5 rounded-md text-sm font-medium transition-colors duration-200 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-offset-2 focus:ring-offset-slate-900 w-24 flex justify-center"
                    >
                        <span x-show="!isLoading">Submit</span>
                        <span x-show="isLoading" x-cloak>Loading...</span>
                    </button>
                </form>

                <!-- Mobile Menu Button (Hidden on desktop) -->
                <div class="lg:hidden flex items-center">
                    <button class="text-slate-300 hover:text-white focus:outline-none">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                </div>
            </div>

        </div>
    </nav>

    <!-- Secondary Action Bar (Light Blue) -->
    <div class="bg-sky-100 border-b border-sky-200 shadow-sm relative z-10">
        <div class="max-w-[1600px] mx-auto px-6 py-3 flex flex-wrap items-center gap-x-8 gap-y-4">
            
            <!-- Filter Section -->
            <form class="flex items-center gap-3" onsubmit="event.preventDefault(); console.log('Filter applied');">
                <label for="topologyFilter" class="text-sm font-semibold text-sky-900 whitespace-nowrap">
                    Filter Topology:
                </label>
                <select 
                    id="topologyFilter" 
                    class="bg-white border border-sky-300 text-slate-700 text-sm rounded-md focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 block py-1.5 pl-3 pr-8 shadow-sm transition-shadow w-48"
                >
                    <option value="all">All Tests</option>
                    <option value="dns">DNS Tests Only</option>
                    <option value="video">Video/Audio Tests Only</option>
                    <option value="tcp">TCP Tests Only</option>
                </select>
                <button 
                    type="submit" 
                    class="bg-white border border-sky-300 hover:bg-sky-50 text-sky-800 px-4 py-1.5 rounded-md text-sm font-medium transition-colors duration-200 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-offset-1 focus:ring-offset-sky-100 whitespace-nowrap"
                >
                    Apply Filter
                </button>
            </form>

            <!-- Divider (Hidden on small screens) -->
            <div class="hidden md:block w-px h-6 bg-sky-300"></div>

            <!-- Graph Settings Section -->
            <div class="flex items-center gap-4">
                <span class="text-sm font-semibold text-sky-900 whitespace-nowrap">
                    Graph Direction:
                </span>
                <div class="flex items-center gap-4">
                    <label class="inline-flex items-center gap-1.5 cursor-pointer">
                        <input type="radio" name="graphDirection" value="LR" class="w-4 h-4 text-blue-600 bg-white border-sky-300 focus:ring-blue-500 focus:ring-2" checked>
                        <span class="text-sm text-slate-700 font-medium">Left to Right</span>
                    </label>
                    <label class="inline-flex items-center gap-1.5 cursor-pointer">
                        <input type="radio" name="graphDirection" value="UD" class="w-4 h-4 text-blue-600 bg-white border-sky-300 focus:ring-blue-500 focus:ring-2">
                        <span class="text-sm text-slate-700 font-medium">Up to Down</span>
                    </label>
                </div>
            </div>

        </div>
    </div>

    <!-- Main Content Area -->
    <main class="flex-grow max-w-[1600px] w-full mx-auto py-8 px-4 sm:px-6 lg:px-8">
        <!-- Card Container -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 lg:p-8">
            <div class="mb-6 border-b border-slate-100 pb-4 flex justify-between items-end">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800">Network Topology</h2>
                    <p class="text-sm text-slate-500 mt-1">Interactive visualization of agents, tests, and targets.</p>
                </div>
            </div>
            
            <!-- Graph Container -->
            <div id="visGraph" class="w-full h-[800px] border border-slate-200 rounded-xl bg-slate-50/50 shadow-inner overflow-hidden focus:outline-none"></div>
        </div>
    </main>

    <!-- Modernized Footer -->
    <footer class="bg-white border-t border-slate-200 mt-auto">
        <div class="max-w-[1600px] mx-auto px-6 py-6 text-center">
            <p class="text-sm text-slate-500">&copy; 2026 Cisco ThousandEyes. All rights reserved.</p>
        </div>
    </footer>

    <!-- Vis.js Logic -->
    <script type="text/javascript">
        // Define Nodes
        const nodes = new vis.DataSet([
            // Agents
            { id: 'agent_315431', label: 'Frankfurt, Germany\ncloud', color: '#FF9000', font: {color: '#fff'}, shape: 'ellipse' },
            { id: 'agent_1332303', label: 'TECOPS-2278-02\n10.1.17.124', color: '#FF9000', font: {color: '#fff'}, shape: 'ellipse' },
            { id: 'agent_1467088', label: 'R1-ISR1121-X-01\n1.1.1.2', color: '#FF9000', font: {color: '#fff'}, shape: 'ellipse' },
            { id: 'agent_1606666', label: 'R1-ASR1001-X-01\n10.1.18.41', color: '#FF9000', font: {color: '#fff'}, shape: 'ellipse' },
            { id: 'agent_1610058', label: 'R1-C9300-24UX-01\n10.1.20.4', color: '#FF9000', font: {color: '#fff'}, shape: 'ellipse' },
            // Tests
            { id: 'test_7031323', label: 'MSTeams - DNS - External\nType: dns-trace', color: '#02C8FF' },
            { id: 'test_7031325', label: 'MSTeams - Video - Internal\nType: agent-to-server', color: '#02C8FF' },
            { id: 'test_7031313', label: 'MSTeams - DNS - Internal\nType: dns-server', color: '#02C8FF' },
            { id: 'test_7031316', label: 'MSTeams - External\nType: agent-to-server', color: '#02C8FF' },
            { id: 'test_7031318', label: 'MSTeams - Internal\nType: agent-to-server', color: '#02C8FF' },
            { id: 'test_7031317', label: 'MSTeams - Audio - Internal\nType: agent-to-server', color: '#02C8FF' },
            // Targets
            { id: 'target_dummy', label: 'Test-Type not supported', color: '#0A60FF', font: {color: '#fff'} },
            { id: 'srv_7031325', label: 'worldaz.tr.teams.microsoft.com:443', color: '#0A60FF', font: {color: '#fff'} },
            { id: 'srv_7031313_2221921', label: 'ns1-39.azure-dns.com', color: '#0A60FF', font: {color: '#fff'} },
            { id: 'srv_7031313_2241766', label: 'ns2-39.azure-dns.net', color: '#0A60FF', font: {color: '#fff'} },
            { id: 'srv_7031313_2241771', label: 'ns3-39.azure-dns.org', color: '#0A60FF', font: {color: '#fff'} },
            { id: 'srv_7031313_2245711', label: 'ns4-39.azure-dns.info', color: '#0A60FF', font: {color: '#fff'} },
            { id: 'srv_7031316', label: 'worldaz.tr.teams.microsoft.com:443', color: '#0A60FF', font: {color: '#fff'} },
            { id: 'srv_7031318', label: 'worldaz.tr.teams.microsoft.com:443', color: '#0A60FF', font: {color: '#fff'} },
            { id: 'srv_7031317', label: 'worldaz.tr.teams.microsoft.com:443', color: '#0A60FF', font: {color: '#fff'} }
        ]);

        // Define Edges
        const edges = new vis.DataSet([
            { from: 'agent_315431', to: 'test_7031323' },
            { from: 'test_7031323', to: 'target_dummy', label: 'unsupported' },
            { from: 'agent_1332303', to: 'test_7031325' }, { from: 'agent_1467088', to: 'test_7031325' }, { from: 'agent_1606666', to: 'test_7031325' }, { from: 'agent_1610058', to: 'test_7031325' },
            { from: 'test_7031325', to: 'srv_7031325', label: 'tcp' },
            { from: 'agent_1332303', to: 'test_7031313' }, { from: 'agent_1606666', to: 'test_7031313' }, { from: 'agent_1610058', to: 'test_7031313' },
            { from: 'test_7031313', to: 'srv_7031313_2221921', label: 'classic' }, { from: 'test_7031313', to: 'srv_7031313_2241766', label: 'classic' }, { from: 'test_7031313', to: 'srv_7031313_2241771', label: 'classic' }, { from: 'test_7031313', to: 'srv_7031313_2245711', label: 'classic' },
            { from: 'agent_315431', to: 'test_7031316' }, { from: 'test_7031316', to: 'srv_7031316', label: 'tcp' },
            { from: 'agent_1332303', to: 'test_7031318' }, { from: 'agent_1467088', to: 'test_7031318' }, { from: 'agent_1606666', to: 'test_7031318' }, { from: 'agent_1610058', to: 'test_7031318' },
            { from: 'test_7031318', to: 'srv_7031318', label: 'tcp' },
            { from: 'agent_1332303', to: 'test_7031317' }, { from: 'agent_1467088', to: 'test_7031317' }, { from: 'agent_1606666', to: 'test_7031317' }, { from: 'agent_1610058', to: 'test_7031317' },
            { from: 'test_7031317', to: 'srv_7031317', label: 'tcp' }
        ]);

        // Configuration
        const options = {
            layout: { hierarchical: { direction: 'LR', sortMethod: 'directed', levelSeparation: 300 } },
            nodes: { shape: 'box', margin: 10, font: { face: 'Arial' } },
            edges: { arrows: 'to', font: { align: 'top' } },
            physics: false
        };

        // Initialize Network
        const network = new vis.Network(document.getElementById('visGraph'), { nodes, edges }, options);

        // Interactive Graph Settings Logic
        document.querySelectorAll('input[name="graphDirection"]').forEach((radio) => {
            radio.addEventListener('change', (e) => {
                const newDirection = e.target.value;
                network.setOptions({
                    layout: {
                        hierarchical: {
                            direction: newDirection
                        }
                    }
                });
            });
        });
    </script>
</body>
</html>
